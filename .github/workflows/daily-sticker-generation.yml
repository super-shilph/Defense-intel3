name: Daily LINE Sticker Generation

on:
  schedule:
    # 06:00 JST (21:00 UTC previous day)
    - cron: '0 21 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Generate today's sticker set
        env:
          IMAGE_PROVIDER: ${{ vars.IMAGE_PROVIDER || 'mock' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
        run: npm run generate:daily

      - name: Commit generated stickers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/output
          git diff --cached --quiet || git commit -m "chore: daily LINE sticker generation $(date -u +%Y-%m-%d)"
          git push
